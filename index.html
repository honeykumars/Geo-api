<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VoidPulse v8.0 | Secure Geo-Terminal</title>
    <style>
        :root { --bg: #000000; --panel: #111111; --cyan: #00f2fe; --admin: #ff0055; --text: #e2e8f0; --rainbow-glow: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Rainbow Flicker Border */
        #viewport { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; border-radius: 12px; margin: 10px; border: 1px solid #222; }
        #viewport::before { content: ""; position: absolute; inset: -2px; background: var(--rainbow-glow); filter: blur(8px); z-index: -1; animation: flicker 0.2s infinite; opacity: 0.5; }
        @keyframes flicker { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }

        header { background: rgba(10,10,10,0.9); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .logo { font-weight: 900; color: var(--cyan); letter-spacing: 2px; text-shadow: 0 0 10px var(--cyan); }
        select { background: #000; color: #fff; border: 1px solid var(--cyan); padding: 5px; border-radius: 5px; }

        /* Hidden Admin Panel */
        #admin-panel { background: #300; padding: 10px; display: none; border-bottom: 2px solid var(--admin); gap: 10px; overflow-x: auto; }
        .adm-btn { background: var(--admin); color: white; border: none; padding: 8px 15px; border-radius: 5px; font-size: 11px; font-weight: bold; cursor: pointer; flex-shrink: 0; }

        #feed { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column-reverse; gap: 15px; }
        .post { background: var(--panel); padding: 15px; border-radius: 15px; border: 1px solid #222; animation: pop 0.3s ease; }
        .post.is-owner { border: 2px solid var(--admin); box-shadow: 0 0 15px rgba(255,0,85,0.4); }
        .meta { font-size: 0.7em; color: var(--cyan); margin-bottom: 5px; display: flex; justify-content: space-between; }
        .content { font-size: 0.95em; line-height: 1.5; }

        footer { background: #0a0a0a; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; }
        #msg-input { flex: 1; background: #000; border: 1px solid #444; color: white; padding: 12px 20px; border-radius: 30px; font-size: 16px; outline: none; }
        #send-btn { background: var(--cyan); color: #000; border: none; width: 45px; height: 45px; border-radius: 50%; font-weight: bold; cursor: pointer; }
        
        #media-btn { background: #222; color: #888; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 20px; }

        @keyframes pop { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="admin-panel">
    <button class="adm-btn" onclick="exec('mute', true)">MUTE ALL</button>
    <button class="adm-btn" onclick="exec('mute', false)">UNMUTE</button>
    <button class="adm-btn" onclick="ownerAlert()">GLOBAL ALERT</button>
    <button class="adm-btn" onclick="forceRedirect()">REDIRECT ALL</button>
</div>

<header>
    <div class="logo">VOID ● PULSE</div>
    <select id="room-select" onchange="switchRoom()">
        <option value="Main">#Main_Feed</option>
        <option value="Alerts">#War_Alerts</option>
        <option value="Dev">#Dev_Lab</option>
    </select>
</header>

<div id="viewport">
    <div id="feed"></div>
</div>

<footer>
    <input type="file" id="file-input" style="display:none" onchange="handleFile()">
    <button id="media-btn" onclick="document.getElementById('file-input').click()">+</button>
    <input type="text" id="msg-input" placeholder="Signal link..." autocomplete="off">
    <button id="send-btn" onclick="send()">></button>
</footer>

<script>
    // --- REPLACE WITH YOUR WORKER WSS LINK ---
    const SERVER = "wss://your-worker.your-subdomain.workers.dev";
    
    let socket;
    let userKey = null; // Key is only in your mind
    let currentMedia = null;
    const myID = "Node_" + Math.floor(Math.random() * 999);

    function connect() {
        socket = new WebSocket(SERVER);
        socket.onopen = () => socket.send(JSON.stringify({ type: "join", room: document.getElementById('room-select').value }));
        socket.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.type === "sys_redirect") window.location.href = data.url;
            if (data.vibrate && navigator.vibrate) navigator.vibrate([100, 50, 100]);
            render(data);
        };
        socket.onclose = () => setTimeout(connect, 2000);
    }

    function send() {
        const input = document.getElementById('msg-input');
        const val = input.value.trim();

        // --- SECRET TRIGGER ---
        if (val === "/system-override") {
            userKey = prompt("Enter Master Access Token:");
            if (userKey) {
                document.getElementById('admin-panel').style.display = 'flex';
                alert("ACCESS GRANTED: WELCOME OWNER");
            }
            input.value = "";
            return;
        }

        if (!val && !currentMedia) return;

        socket.send(JSON.stringify({
            type: "chat",
            user: myID,
            text: val,
            media: currentMedia,
            room: document.getElementById('room-select').value
        }));
        
        input.value = "";
        currentMedia = null;
    }

    function render(data) {
        if (!data.text && !data.media) return;
        const feed = document.getElementById('feed');
        const div = document.createElement('div');
        div.className = `post ${data.isOwner ? 'is-owner' : ''}`;
        
        div.innerHTML = `
            <div class="meta"><span>${data.isOwner ? '👑 OWNER' : data.user}</span><span>${data.time || ''}</span></div>
            <div class="content">${data.text || ''}</div>
            ${data.media ? `<img src="${data.media}" style="width:100%; border-radius:10px; margin-top:10px;">` : ''}
        `;
        feed.prepend(div);
        if (feed.children.length > 30) feed.removeChild(feed.lastChild);
    }

    // --- ENFORCEMENT COMMANDS ---
    function exec(action, val) {
        socket.send(JSON.stringify({ admin_key: userKey, action: action, value: val, room: document.getElementById('room-select').value }));
    }

    function ownerAlert() {
        const m = prompt("Broadcast message:");
        if (m) socket.send(JSON.stringify({ admin_key: userKey, action: "broadcast", text: m }));
    }

    function forceRedirect() {
        const u = prompt("URL to force move users:");
        if (u) exec('redirect', u);
    }

    function handleFile() {
        const file = document.getElementById('file-input').files[0];
        const reader = new FileReader();
        reader.onloadend = () => { currentMedia = reader.result; alert("Media Attached"); };
        reader.readAsDataURL(file);
    }

    function switchRoom() {
        document.getElementById('feed').innerHTML = "";
        socket.send(JSON.stringify({ type: "join", room: document.getElementById('room-select').value }));
    }

    connect();
</script>
     <script src="index.js"></script>
</body>
</html>
